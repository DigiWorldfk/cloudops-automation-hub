apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
# Install ArgoCD — apply this with:
#   kubectl apply -k gitops/argocd/
#
# Then retrieve the initial admin password:
#   kubectl -n argocd get secret argocd-initial-admin-secret \
#     -o jsonpath="{.data.password}" | base64 -d
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  - rbac.yaml
  - image-updater.yaml
  - project.yaml  # Dedicated AppProject — must be applied before any Application
patches:
  - patch: |-
      - op: replace
        path: /spec/type
        value: LoadBalancer
    target:
      kind: Service
      name: argocd-server
