# secrets.example.yaml — TEMPLATE ONLY, DO NOT PUT REAL VALUES HERE
#
# Real secrets must be created out-of-band. Choose one of:
#
#   Option A — kubectl (recommended for initial setup):
#     kubectl create secret generic backend-secrets \
#       --namespace=backend \
#       --from-literal=database_url='postgres://user:password@host:5432/db' \
#       --from-literal=jwt_secret='<strong-random-string>'
#
#   Option B — Azure Key Vault + CSI driver (recommended for production):
#     See docs/architecture/keyvault-csi.md
#
#   Option C — Sealed Secrets (GitOps-friendly):
#     kubeseal --format yaml < secrets.yaml > sealed-secrets.yaml
#     # Commit sealed-secrets.yaml — the raw secrets.yaml must NOT be committed.
#
# ─── Schema reference (do not use real values below) ──────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: backend
type: Opaque
# NOTE: DATABASE_URL is managed via Azure Key Vault + CSI driver.
# See secret-provider-class.yaml — the connection string is never stored here.
stringData:
  database_url: "postgres://USER:PASSWORD@HOST:5432/DBNAME"  # CHANGE_ME
  jwt_secret: "CHANGE_ME_USE_openssl_rand_-hex_32"
