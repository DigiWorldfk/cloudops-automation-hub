# ─────────────────────────────────────────────────────────────────────────────
# Azure Key Vault CSI SecretProviderClass — MySQL connection string
#
# This mounts the MySQL connection string from Key Vault directly into the
# backend pod filesystem. The secret is NEVER stored in Kubernetes etcd.
#
# Prerequisites:
#   1. Enable the Key Vault CSI addon:
#        az aks enable-addons --addons azure-keyvault-secrets-provider \
#          --name <aks-name> --resource-group <rg>
#   2. Grant the AKS kubelet identity "Key Vault Secrets User" on the Key Vault:
#        az role assignment create \
#          --role "Key Vault Secrets User" \
#          --assignee <kubelet-object-id> \
#          --scope <key-vault-resource-id>
#   3. Apply this file: kubectl apply -f secret-provider-class.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mysql-secrets
  namespace: backend
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    # Use Azure Workload Identity (OIDC) — NOT VM managed identity
    # The clientID is the backend workload identity client ID from:
    #   terraform output -json workload_identity_client_ids | jq '.backend'
    clientID: "REPLACE_WITH_BACKEND_WORKLOAD_IDENTITY_CLIENT_ID"
    keyvaultName: ""            # injected at deploy time via Kustomize / Helm
    objects: |
      array:
        - |
          objectName: REPLACE_WITH_CONNECTION_STRING_SECRET_NAME
          objectType: secret
          objectAlias: database_url
        - |
          objectName: REPLACE_WITH_ADMIN_PASSWORD_SECRET_NAME
          objectType: secret
          objectAlias: mysql_password
    tenantId: ""                          # injected at deploy time
  secretObjects:
    # Syncs the KV secret into a Kubernetes Secret so env vars work too
    - secretName: backend-db-secrets
      type: Opaque
      data:
        - objectName: database_url
          key: DATABASE_URL
        - objectName: mysql_password
          key: MYSQL_PASSWORD
