# ─── Pod Security Admission Labels ───────────────────────────────────────────
# Adds PSA enforcement to namespaces. Restricted profile: no root, no privilege
# escalation, read-only root FS, drop ALL capabilities.
#
# Usage: kubectl apply -f namespace-security.yaml
# These replace the deprecated PodSecurityPolicy (PSP) API.
---
apiVersion: v1
kind: Namespace
metadata:
  name: frontend
  labels:
    kubernetes.io/metadata.name: frontend
    # Enforce: pods violating the policy are rejected
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    # Audit: violations logged but not rejected (for gradual rollout review)
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    # Warn: violations produce admission warnings
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: backend
  labels:
    kubernetes.io/metadata.name: backend
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    kubernetes.io/metadata.name: monitoring
    # Monitoring stack needs slightly elevated permissions for node metrics
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
