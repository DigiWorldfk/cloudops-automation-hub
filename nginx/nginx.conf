user  nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    # ── Rate Limit Zones ─────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=login_zone:10m  rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:20m    rate=30r/s;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header X-XSS-Protection          "1; mode=block"                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()"  always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # ── WAF: Block common attack patterns ────────────────────────────────────
    map $request_uri $blocked_uri {
        default 0;
        ~*(\.\./|\.\.\\)           1;   # path traversal
        ~*(union.*select|insert.*into|drop.*table) 1;  # SQLi
        ~*(<script|javascript:|onerror=) 1;  # XSS
        ~*(\/etc\/passwd|\/proc\/self) 1;  # LFI
        ~*(\|\||&&|;.*bash|;.*sh\b) 1;  # command injection
    }

    map $http_user_agent $blocked_agent {
        default 0;
        ~*(sqlmap|nikto|nmap|masscan|zgrab) 1;
    }

    server {
        listen 80;
        server_name _;

        # Block WAF matches
        if ($blocked_uri  = 1) { return 403; }
        if ($blocked_agent = 1) { return 403; }

        # ── Static Frontend ───────────────────────────────────────────────────
        root /usr/share/nginx/html;
        index login.html;

        location / {
            try_files $uri $uri/ /login.html;
        }

        # ── Auth endpoints (strict rate limit) ───────────────────────────────
        location /api/auth/login {
            limit_req zone=login_zone burst=3 nodelay;
            limit_req_status 429;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── Terraform plan SSE stream (long timeout) ─────────────────────────
        location /api/terraform/plan {
            limit_req zone=api_zone burst=5 nodelay;
            proxy_pass             http://backend:8000;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout     600s;
            proxy_buffering        off;
            proxy_cache            off;
            chunked_transfer_encoding on;
        }

        # ── All other API endpoints ───────────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── Health check (no rate limit, no auth) ────────────────────────────
        location /health {
            proxy_pass http://backend:8000/api/health;
            access_log off;
        }
    }
}
