user  nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:20m   rate=30r/s;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # WAF: block known scanner user-agents
    map $http_user_agent $blocked_agent {
        default   0;
        ~*sqlmap  1;
        ~*nikto   1;
        ~*nmap    1;
        ~*masscan 1;
        ~*zgrab   1;
    }

    server {
        listen 80;
        server_name _;

        if ($blocked_agent = 1) {
            return 403;
        }

        # Static frontend
        root  /usr/share/nginx/html;
        index login.html;

        location / {
            try_files $uri $uri/ /login.html;
        }

        # Auth endpoints (strict rate limit)
        location /api/auth/login {
            limit_req        zone=login_zone burst=3 nodelay;
            limit_req_status 429;
            proxy_pass       http://backend:8000;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Terraform plan SSE stream (long timeout)
        location /api/terraform/plan {
            limit_req  zone=api_zone burst=5 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout         600s;
            proxy_buffering            off;
            proxy_cache                off;
            chunked_transfer_encoding  on;
        }

        # All other API endpoints
        location /api/ {
            limit_req        zone=api_zone burst=20 nodelay;
            limit_req_status 429;
            proxy_pass       http://backend:8000;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Health check
        location /health {
            proxy_pass http://backend:8000/api/health;
            access_log off;
        }
    }
}
