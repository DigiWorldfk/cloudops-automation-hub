# gitleaks.toml — secret scanning rules
# https://github.com/gitleaks/gitleaks
#
# Run locally:   gitleaks detect --config .gitleaks.toml --source .
# Run in CI:     see pipelines/security.yml

title = "AKS Enterprise Platform — gitleaks config"

[extend]
useDefault = true  # inherit the full default ruleset

# ── Additional custom rules ──────────────────────────────────────────────────
[[rules]]
id          = "azure-storage-key"
description = "Azure Storage Account Key"
regex       = '''(?i)(AccountKey|storage[_-]?account[_-]?key)\s*[=:]\s*[A-Za-z0-9+/]{86}=='''
tags        = ["azure", "key"]

[[rules]]
id          = "azure-client-secret"
description = "Azure Service Principal Client Secret"
regex       = '''(?i)(client[_-]?secret|AZURE_CLIENT_SECRET)\s*[=:]\s*[A-Za-z0-9~_\-\.]{34,}'''
tags        = ["azure", "secret"]

[[rules]]
id          = "kubeconfig"
description = "Inline kubeconfig certificate-authority-data"
regex       = '''certificate-authority-data:\s+[A-Za-z0-9+/]{100,}'''
tags        = ["kubernetes"]

# ── Allowlist ────────────────────────────────────────────────────────────────
[allowlist]
description = "Global allowlist"
files       = [
  '''.gitleaks\.toml''',
  '''\.example$''',
  '''\.example\.yaml$''',
  '''\.example\.hcl$''',
  '''CHANGE_ME''',
]
regexes     = [
  '''CHANGE_ME''',
  '''YOUR_.*_HERE''',
  '''<.*>''',          # placeholder syntax
]
