name: Build & Push Images

on:
  push:
    branches: [main, develop]
    paths:
      - "azure-aks-enterprise-platform/kubernetes/**"
      - "azure-aks-enterprise-platform/helm/**"

# Required for OIDC token exchange with Azure + creating PRs
permissions:
  id-token: write    # allows requesting OIDC JWT for Azure login
  contents: write    # allows committing image tag updates
  pull-requests: write  # allows opening PRs on main

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}                        # e.g. acraksenterprise
  ACR_REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'azure-aks-enterprise-platform/kubernetes/frontend/**'
            backend:
              - 'azure-aks-enterprise-platform/kubernetes/backend/**'

  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        include:
          - service: frontend
            changed: ${{ needs.detect-changes.outputs.frontend }}
          - service: backend
            changed: ${{ needs.detect-changes.outputs.backend }}
    if: matrix.changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.ACR_REGISTRY }}/${{ matrix.service }}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC — no long-lived secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: azure-aks-enterprise-platform/kubernetes/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}
            ${{ env.ACR_REGISTRY }}/${{ matrix.service }}:${{ github.ref_name == 'main' && 'stable' || 'develop' }}
          cache-from: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ matrix.service }}:cache,mode=max

      - name: Update image tag in Helm values
        run: |
          sed -i "s|tag:.*|tag: ${{ steps.tag.outputs.tag }}|" \
            azure-aks-enterprise-platform/helm/values.yaml

      - name: Commit updated image tag
        # Security: only allow bot commits to develop, never to main.
        # On main, image tags must flow through a PR from develop.
        # This prevents the bot from bypassing branch protection on main.
        if: github.ref_name != 'main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(${{ matrix.service }}): update image tag to ${{ steps.tag.outputs.tag }}"
          file_pattern: azure-aks-enterprise-platform/helm/values.yaml

      - name: Open PR to update image tag on main
        # On main builds (e.g. hotfix), open a PR instead of committing directly.
        if: github.ref_name == 'main'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(${{ matrix.service }}): update image tag to ${{ steps.tag.outputs.tag }}"
          title: "chore(${{ matrix.service }}): update image tag to ${{ steps.tag.outputs.tag }}"
          body: "Automated image tag update from CI build ${{ github.run_id }}. Requires review before merge to main."
          branch: "bot/image-tag-${{ matrix.service }}-${{ steps.tag.outputs.tag }}"
          base: main
          labels: automated,image-update
