# ─── ServiceAccounts with Azure Workload Identity ─────────────────────────────
# Each workload gets a dedicated SA with the azure.workload.identity/client-id
# annotation set to the managed identity provisioned by the workload_identity module.
# The label azure.workload.identity/use: "true" on the pod spec triggers token injection.
#
# Replace CLIENT_ID placeholders with outputs from:
#   terraform output -json workload_identity_client_ids
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: frontend
  annotations:
    # Set to: module.workload_identity.identity_client_ids["frontend"]
    azure.workload.identity/client-id: "REPLACE_WITH_FRONTEND_CLIENT_ID"
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: backend
  annotations:
    # Set to: module.workload_identity.identity_client_ids["backend"]
    azure.workload.identity/client-id: "REPLACE_WITH_BACKEND_CLIENT_ID"
  labels:
    azure.workload.identity/use: "true"
---
# ─── Kubernetes RBAC — Namespace-Scoped ───────────────────────────────────────
# backend-sa can read secrets (for CSI sync) but not write.
# frontend-sa gets read-only access to its own namespace resources.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: backend
rules:
  # Scoped to ONLY the secrets this workload needs — prevents secret enumeration
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - "backend-db-secrets"   # CSI-synced Key Vault secret
      - "backend-secrets"      # JWT secret
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: backend
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: backend
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frontend-role
  namespace: frontend
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-rolebinding
  namespace: frontend
subjects:
  - kind: ServiceAccount
    name: frontend-sa
    namespace: frontend
roleRef:
  kind: Role
  name: frontend-role
  apiGroup: rbac.authorization.k8s.io
