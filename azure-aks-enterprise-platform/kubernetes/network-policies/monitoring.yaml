# ─── Monitoring Namespace Network Policies ────────────────────────────────────
# Prometheus scrapes metrics from all namespaces.
# Grafana serves dashboards — only accessible from internal cluster.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-egress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Scrape all namespaces for metrics
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8888
        - protocol: TCP
          port: 9100 # node-exporter
    # HTTPS (for remote write, alerts)
    - ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    # Allow access from App Gateway (AGIC subnet)
    - from:
        - ipBlock:
            cidr: 10.10.2.0/24
      ports:
        - protocol: TCP
          port: 3000
