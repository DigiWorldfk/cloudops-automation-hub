name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff safety
          pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Security check (safety)
        run: safety check -r backend/requirements.txt --continue-on-error

      - name: Syntax check (import test)
        run: |
          cd backend
          python -c "import main"

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build backend image
        run: docker build -t cloudops-backend:ci ./backend

      - name: Build nginx image
        run: docker build -t cloudops-nginx:ci -f nginx/Dockerfile .
