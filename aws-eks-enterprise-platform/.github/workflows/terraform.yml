###############################################################################
# Terraform CI/CD — validate → policy-check → plan → apply
###############################################################################

name: Terraform

on:
  push:
    branches: [main, develop]
    paths:
      - 'terraform/**'
      - 'policies/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'terraform/**'
      - 'policies/**'

permissions:
  id-token: write   # OIDC → AWS
  contents: read
  pull-requests: write

env:
  TERRAFORM_VERSION: "1.8.0"
  TFLINT_VERSION: "v0.51.0"
  CONFTEST_VERSION: "0.45.0"
  AWS_REGION: "eu-west-1"

jobs:
  # ── 1. Validate (all envs in matrix) ──────────────────────────────────────
  terraform-validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install tflint
        run: |
          curl -sLo tflint.zip https://github.com/terraform-linters/tflint/releases/download/${{ env.TFLINT_VERSION }}/tflint_linux_amd64.zip
          unzip tflint.zip && mv tflint /usr/local/bin/

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Init (no backend)
        run: terraform init -backend=false
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: tflint
        run: tflint --recursive
        working-directory: terraform

  # ── 2. Policy Check (conftest / OPA) ──────────────────────────────────────
  policy-check:
    name: Policy Check (OPA)
    runs-on: ubuntu-latest
    needs: terraform-validate

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (OIDC — dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install conftest
        run: |
          curl -sLo conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v${{ env.CONFTEST_VERSION }}/conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz
          tar -xzf conftest.tar.gz && mv conftest /usr/local/bin/

      - name: Terraform Init (dev)
        run: terraform init -backend-config=${{ secrets.TF_BACKEND_DEV }}
        working-directory: terraform/environments/dev
        env:
          TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME_DEV }}
          TF_VAR_github_org: DigiWorldfk
          TF_VAR_db_master_password: ${{ secrets.DB_MASTER_PASSWORD_DEV }}

      - name: Terraform Plan (dev — JSON for policy check)
        run: |
          terraform plan -out=tfplan.bin \
            -var="domain_name=${{ secrets.DOMAIN_NAME_DEV }}" \
            -var="github_org=DigiWorldfk" \
            -var="db_master_password=${{ secrets.DB_MASTER_PASSWORD_DEV }}"
          terraform show -json tfplan.bin > tfplan.json
        working-directory: terraform/environments/dev

      - name: Run conftest
        run: conftest test --policy ../../policies tfplan.json
        working-directory: terraform/environments/dev

  # ── 3. Plan (PR only) ─────────────────────────────────────────────────────
  terraform-plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: policy-check
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(matrix.environment))] }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=${{ secrets[format('TF_BACKEND_{0}', upper(matrix.environment))] }}
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color \
            -var="domain_name=${{ secrets[format('DOMAIN_NAME_{0}', upper(matrix.environment))] }}" \
            -var="github_org=DigiWorldfk" \
            -var="db_master_password=${{ secrets[format('DB_MASTER_PASSWORD_{0}', upper(matrix.environment))] }}" \
            2>&1 | tee plan.txt
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ matrix.environment }}/plan.txt', 'utf8');
            const body = `## Terraform Plan — \`${{ matrix.environment }}\`\n\`\`\`hcl\n${plan.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body });

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: terraform/environments/${{ matrix.environment }}/plan.txt
          retention-days: 3

  # ── 4. Apply dev (push to develop) ────────────────────────────────────────
  apply-dev:
    name: Apply dev
    runs-on: ubuntu-latest
    needs: policy-check
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - run: terraform init -backend-config=${{ secrets.TF_BACKEND_DEV }}
        working-directory: terraform/environments/dev

      - run: |
          terraform apply -auto-approve \
            -var="domain_name=${{ secrets.DOMAIN_NAME_DEV }}" \
            -var="github_org=DigiWorldfk" \
            -var="db_master_password=${{ secrets.DB_MASTER_PASSWORD_DEV }}"
        working-directory: terraform/environments/dev

  # ── 5. Apply staging (push to main, after dev) ────────────────────────────
  apply-staging:
    name: Apply staging
    runs-on: ubuntu-latest
    needs: apply-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      # Requires 1 reviewer in GitHub Environment settings

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - run: terraform init -backend-config=${{ secrets.TF_BACKEND_STAGING }}
        working-directory: terraform/environments/staging

      - run: |
          terraform apply -auto-approve \
            -var="domain_name=${{ secrets.DOMAIN_NAME_STAGING }}" \
            -var="github_org=DigiWorldfk" \
            -var="db_master_password=${{ secrets.DB_MASTER_PASSWORD_STAGING }}"
        working-directory: terraform/environments/staging

  # ── 6. Apply prod (manual approval gate) ──────────────────────────────────
  apply-prod:
    name: Apply prod
    runs-on: ubuntu-latest
    needs: apply-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      # Requires SRE team approval in GitHub Environment settings

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - run: terraform init -backend-config=${{ secrets.TF_BACKEND_PROD }}
        working-directory: terraform/environments/prod

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan.bin \
            -var="domain_name=${{ secrets.DOMAIN_NAME_PROD }}" \
            -var="github_org=DigiWorldfk" \
            -var="db_master_password=${{ secrets.DB_MASTER_PASSWORD_PROD }}"
        working-directory: terraform/environments/prod

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan.bin
        working-directory: terraform/environments/prod

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number || 1,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **prod apply failed** — check [workflow run](' + context.payload.repository.html_url + '/actions/runs/' + context.runId + ')'
            });
