###############################################################################
# ClusterSecretStore — External Secrets Operator → AWS SSM Parameter Store
# Deploy after: terraform apply + ESO Helm install
###############################################################################

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-ssm-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: eu-west-1  # REPLACE_WITH_YOUR_REGION
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  annotations:
    # REPLACE_WITH_ESO_ROLE_ARN — output from module.ssm_secrets.eso_role_arn
    eks.amazonaws.com/role-arn: "REPLACE_WITH_ESO_ROLE_ARN"
